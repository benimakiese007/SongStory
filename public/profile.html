<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Public - SongStory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-400 antialiased">
    <nav class="p-6 border-b border-white/5">
        <a href="index.html" class="flex items-center gap-2"><img src="images/logo/song-story-logo-png.png" alt="SongStory Logo" class="h-8" loading="lazy"></a>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-20">
        <div id="profile-header" class="text-center mb-16">
            <div id="pub-avatar" class="w-24 h-24 rounded-full bg-zinc-800 border border-white/10 mx-auto mb-6 flex items-center justify-center text-3xl font-bold text-amber-400 overflow-hidden"></div>
            <h1 id="pub-name" class="text-3xl text-white font-medium mb-2">Chargement...</h1>
            <p id="pub-bio" class="text-zinc-500 text-sm">Passionné(e) de décryptage musical sur SongStory.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div>
                <h3 class="text-white font-medium mb-6 flex items-center gap-2">
                    <iconify-icon icon="solar:heart-bold" class="text-amber-500"></iconify-icon> Favoris
                </h3>
                <div id="pub-favorites" class="space-y-4"></div>
            </div>
            <div>
                <h3 class="text-white font-medium mb-6 flex items-center gap-2">
                    <iconify-icon icon="solar:playlist-minimalistic-bold" class="text-amber-500"></iconify-icon> Playlists
                </h3>
                <div id="pub-playlists" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('user') || 'Utilisateur';
            
            document.getElementById('pub-name').textContent = user;
            document.getElementById('pub-avatar').textContent = user[0].toUpperCase();

            // Simulate loading from local history of the current user (for demo)
            // In a real app, this would fetch from Supabase by user ID
            const favIds = JSON.parse(localStorage.getItem('ss_favorites') || '[]');
            const playlists = JSON.parse(localStorage.getItem('ss_playlists') || '[]');
            
            const favContainer = document.getElementById('pub-favorites');
            if (favIds.length) {
                favIds.forEach(id => {
                    const s = SONGS_DATA.find(s => s.id === id);
                    if (s) {
                        favContainer.innerHTML += `
                            <a href="songs/${s.id}.html" class="flex items-center gap-4 p-4 bg-zinc-900/50 rounded-2xl border border-white/5 hover:border-amber-500/30 transition-all">
                                <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center text-zinc-600"><iconify-icon icon="solar:music-note-linear"></iconify-icon></div>
                                <div><div class="text-white text-sm font-medium">${s.title}</div><div class="text-xs text-zinc-500">${s.artist}</div></div>
                            </a>`;
                    }
                });
            } else {
                favContainer.innerHTML = '<p class="text-xs italic text-zinc-600">Aucun favori public.</p>';
            }

            const plContainer = document.getElementById('pub-playlists');
            if (playlists.length) {
                playlists.forEach(pl => {
                    plContainer.innerHTML += `
                        <div class="p-6 bg-zinc-900/30 rounded-2xl border border-white/5">
                            <div class="text-white text-sm font-medium mb-1">${pl.name}</div>
                            <div class="text-[10px] text-zinc-600 uppercase tracking-widest">${pl.songs.length} titres</div>
                        </div>`;
                });
            } else {
                plContainer.innerHTML = '<p class="text-xs italic text-zinc-600">Aucune playlist publique.</p>';
            }
        });
    </script>
</body>
</html>
