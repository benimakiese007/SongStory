    <nav class="sticky top-0 z-50 w-full backdrop-blur-xl bg-zinc-950/80 border-b border-white/5">

    <main class="py-20 lg:py-32">

                <p class="text-lg text-zinc-500 max-w-2xl mx-auto font-light">Rencontrez les voix qui façonnent notre
                    bibliothèque.</p>
            </div>

            <div id="artists-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Artists will be loaded here -->
                <div class="col-span-full py-20 text-center text-zinc-600 animate-pulse">
                    Chargement des artistes...
                </div>

        </div>
        </div>

    <footer class="border-t border-white/5 py-12 text-center text-xs text-zinc-600">

    <script src="js/data.js"></script>
    <script src="js/seo.js"></script>

    <script src="js/supabase-auth.js"></script>
    <script src="js/auth.js"></script>

    <script src="js/search.js"></script>
    <script src="js/player.js"></script>
    <script src="js/router.js"></script>

    <script src="js/pwa.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('artists-grid');

            async function loadArtists() {
                let artists = [];
                let songCounts = {};

                if (window.ss_supabase) {
                    try {
                        const [artistsRes, songsRes] = await Promise.all([
                            window.ss_supabase.from('artists').select('*'),
                            window.ss_supabase.from('songs').select('artist_id')
                        ]);

                        if (!artistsRes.error) artists = artistsRes.data || [];
                        if (!songsRes.error) {
                            (songsRes.data || []).forEach(s => {
                                songCounts[s.artist_id] = (songCounts[s.artist_id] || 0) + 1;
                            });
                        }
                    } catch (err) {
                        console.warn('Supabase request failed, falling back to local data:', err);
                    }
                }

                if (artists.length === 0 && typeof ARTISTS_DATA !== 'undefined') {
                    artists = ARTISTS_DATA;
                    // Mock counts for static data
                    artists.forEach(a => songCounts[a.id] = 1);
                }

                renderArtists(artists, songCounts);
            }

            function renderArtists(artists, counts) {
                if (!grid) return;
                grid.innerHTML = artists.map(artist => `
                    <a href="artists/${artist.id}.html"
                        class="reveal visible artist-card group bg-zinc-900/30 border border-white/5 rounded-2xl p-6 hover:bg-zinc-900/50 hover:border-white/10 transition-all"
                        style="text-decoration:none;">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="artist-avatar" style="width:64px;height:64px;margin-bottom:0;">
                                <iconify-icon icon="solar:user-bold"
                                    class="text-zinc-600 group-hover:text-amber-400 transition-colors"
                                    width="28"></iconify-icon>
                            </div>
                            <div>
                                <h3 class="text-white font-medium text-lg group-hover:text-amber-400 transition-colors">
                                    ${artist.name}</h3>
                                <p class="text-zinc-500 text-sm">${artist.genre} · ${artist.country}</p>
                            </div>
                        </div>
                        <p class="text-zinc-500 text-sm leading-relaxed mb-4">${artist.bio.substring(0, 120)}...</p>
                        <div class="flex items-center justify-between text-xs text-zinc-600">
                            <span>${counts[artist.id] || 0} analyse(s) disponible(s)</span>
                            <iconify-icon icon="solar:arrow-right-linear"
                                class="text-amber-400 opacity-0 group-hover:opacity-100 transition-opacity"
                                width="16"></iconify-icon>
                        </div>
                    </a>
                `).join('');
            }

            loadArtists();
        });
    </script>
    <script src="js/app.js"></script>
</body>

</html>
