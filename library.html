<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque - SongStory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">
    <style>
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cursor-dot,
        .cursor-outline {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #fbbf24;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(251, 191, 36, 0.3);
        }
    </style>
</head>

<body class="bg-zinc-950 text-zinc-400 antialiased" style="font-family: 'Inter', sans-serif;">
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="sticky top-0 z-50 w-full backdrop-blur-xl bg-zinc-950/80 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <a href="index.html" class="text-white text-lg font-medium tracking-tighter">SONGSTORY.</a>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-center space-x-8">
                        <a href="index.html"
                            class="text-zinc-400 text-sm hover:text-white transition-colors">Découvrir</a>
                        <a href="library.html"
                            class="text-white text-sm border-b-2 border-amber-400 py-1 transition-colors">Bibliothèque</a>
                        <a href="artists.html"
                            class="text-zinc-400 text-sm hover:text-white transition-colors">Artistes</a>
                        <a href="about.html" class="text-zinc-400 text-sm hover:text-white transition-colors">À
                            propos</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-20 lg:py-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-16">
                <h1 class="text-4xl md:text-6xl text-white font-medium tracking-tighter mb-6">Bibliothéque</h1>
                <p class="text-lg text-zinc-500 max-w-2xl font-light">Explorez notre collection complète de décryptages
                    musicaux.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <a href="songs/bohemian-rhapsody.html"
                    class="reveal group relative bg-zinc-900/30 border border-white/5 p-6 rounded-2xl hover:bg-zinc-900/50 transition-all">
                    <span class="text-xs text-amber-400 uppercase tracking-widest font-medium mb-4 block">Rock •
                        1975</span>
                    <h3 class="text-xl text-white font-medium mb-2 group-hover:text-amber-400 transition-colors">
                        Bohemian Rhapsody</h3>
                    <p class="text-sm text-zinc-500 leading-relaxed">Queen</p>
                </a>
                <a href="songs/macarena.html"
                    class="reveal group relative bg-zinc-900/30 border border-white/5 p-6 rounded-2xl hover:bg-zinc-900/50 transition-all">
                    <span class="text-xs text-amber-400 uppercase tracking-widest font-medium mb-4 block">Rap •
                        2017</span>
                    <h3 class="text-xl text-white font-medium mb-2 group-hover:text-amber-400 transition-colors">
                        Macarena</h3>
                    <p class="text-sm text-zinc-500 leading-relaxed">Damso</p>
                </a>
                <a href="songs/euphoria.html"
                    class="reveal group relative bg-zinc-900/30 border border-white/5 p-6 rounded-2xl hover:bg-zinc-900/50 transition-all">
                    <span class="text-xs text-amber-400 uppercase tracking-widest font-medium mb-4 block">Beef •
                        2024</span>
                    <h3 class="text-xl text-white font-medium mb-2 group-hover:text-amber-400 transition-colors">
                        Euphoria</h3>
                    <p class="text-sm text-zinc-500 leading-relaxed">Kendrick Lamar</p>
                </a>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-12 text-center text-xs text-zinc-600">
        <p>© 2024 SongStory. Tous droits réservés.</p>
    </footer>
    <script src="js/app.js"></script>
</body>

</html>
